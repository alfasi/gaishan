<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaishan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0b0c12;
      --bg-surface: #111219;
      --bg-elevated: #1a1b27;
      --bg-hover: #232535;
      --bg-active: #2c2e44;
      --border: #262840;
      --border-light: #34375a;
      --text: #c4c7d8;
      --text-dim: #6a6d84;
      --text-bright: #e8eaf4;
      --accent: #d4a24c;
      --accent-hover: #e2b35e;
      --accent-dim: rgba(212, 162, 76, 0.12);
      --accent-glow: rgba(212, 162, 76, 0.25);
      --red: #d85252;
      --blue: #6ba0d8;
      --controls-bg: rgba(11, 12, 18, 0.88);
      --popup-bg: rgba(17, 18, 25, 0.96);
      --radius: 8px;
      --font: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════ Landing ═══════════════════════ */
    #landing {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(212, 162, 76, 0.04) 0%, transparent 60%),
        var(--bg-deep);
    }

    #drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      width: 480px;
      height: 320px;
      border: 2px dashed var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      position: relative;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 40px rgba(212, 162, 76, 0.06);
    }

    #drop-zone .drop-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: transform 0.3s;
    }

    #drop-zone:hover .drop-icon { transform: translateY(-2px); }

    #drop-zone .drop-icon svg { width: 28px; height: 28px; }

    .landing-title {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-bright);
    }

    .landing-title span {
      color: var(--accent);
      font-weight: 500;
    }

    .landing-sub {
      font-size: 0.9rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    .landing-or {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }

    .landing-folder-btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1.2rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.85rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .landing-folder-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-light);
    }

    #file-input, #folder-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    #folder-input {
      position: static;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    /* ═══════════════════════ File browser ═══════════════════════ */
    #file-browser {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      transition: width 0.25s ease;
      overflow: hidden;
      z-index: 5;
    }

    #file-browser.collapsed {
      width: 0;
      border-right-color: transparent;
    }

    .fb-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-width: 260px;
    }

    .fb-header-title {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fb-close {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .fb-close:hover { background: var(--bg-hover); color: var(--text-bright); }
    .fb-close svg { width: 14px; height: 14px; }

    .fb-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      min-width: 260px;
    }

    .fb-tree::-webkit-scrollbar { width: 5px; }
    .fb-tree::-webkit-scrollbar-track { background: transparent; }
    .fb-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .fb-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: background 0.1s;
      white-space: nowrap;
      user-select: none;
    }

    .fb-item:hover { background: var(--bg-hover); }

    .fb-item.active {
      background: var(--accent-dim);
      border-left-color: var(--accent);
      color: var(--text-bright);
    }

    .fb-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .fb-item.dir svg { color: var(--accent); }
    .fb-item.file svg { color: var(--text-dim); }

    .fb-item .fb-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fb-children {
      padding-left: 16px;
    }

    .fb-children.collapsed { display: none; }

    .fb-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-dim);
      transition: background 0.1s, color 0.1s;
      border-bottom: 1px solid var(--border);
    }

    .fb-back:hover { background: var(--bg-hover); color: var(--text); }
    .fb-back svg { width: 14px; height: 14px; }

    /* ═══════════════════════ App layout ═══════════════════════ */
    #app {
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ═══════════════════════ Player ═══════════════════════ */
    #player-area {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-width: 0;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── Toast ── */
    #toast {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--controls-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 50;
      white-space: nowrap;
    }

    #toast.visible { opacity: 1; }

    /* ═══════════════════════ Subtitle overlay ═══════════════════════ */
    #subtitle-overlay {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: auto;
      max-width: 88%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      transition: bottom 0.3s;
    }

    .controls-visible #subtitle-overlay { bottom: 80px; }
    .controls-hidden #subtitle-overlay { bottom: 24px; }

    .subtitle-line {
      display: inline-block;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      margin-bottom: 0.2rem;
      line-height: 1.6;
    }

    .subtitle-line .word {
      cursor: pointer;
      display: inline-block;
      border-radius: 4px;
      padding: 0.15rem 0.12rem;
      transition: background 0.15s, outline 0.15s;
    }

    .subtitle-line .word:hover {
      background: var(--accent-glow);
    }

    .subtitle-line .word.highlighted {
      background: rgba(212, 162, 76, 0.3);
      outline: 2px solid var(--red);
      outline-offset: 1px;
    }

    .subtitle-line .char {
      display: inline-block;
      padding: 0 1px;
      border-radius: 2px;
    }

    .subtitle-line ruby { font-size: 1.6rem; }
    .subtitle-line rt { font-size: 0.7rem; color: #bbb; font-weight: 300; }
    .subtitle-line .char:not([data-pinyin]) { font-size: 1.4rem; }

    .subtitle-line > .char {
      cursor: pointer;
      transition: background 0.15s;
    }
    .subtitle-line > .char:hover { background: rgba(255, 255, 255, 0.15); }

    .subtitle-line-english {
      display: block;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 0.25rem 0.7rem;
      border-radius: 6px;
      margin-top: 0.2rem;
      font-size: 1.05rem;
      color: #d0d0d0;
      line-height: 1.5;
      min-height: 1.8em;
    }

    .subtitle-line-english.empty { visibility: hidden; }

    .hide-pinyin rt { display: none; }
    .hide-pinyin .transcript-pinyin { display: none; }

    /* ═══════════════════════ Controls ═══════════════════════ */
    #controls-wrapper {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.7) 30%, var(--controls-bg));
      padding-top: 40px;
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    .controls-hidden #controls-wrapper {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Progress bar ── */
    #progress-container {
      height: 20px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      cursor: pointer;
      position: relative;
    }

    #progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      position: relative;
      transition: height 0.15s;
    }

    #progress-container:hover #progress-track { height: 5px; }

    #progress-buffered {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 2px;
    }

    #progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    #progress-handle {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 0 6px rgba(212, 162, 76, 0.4);
    }

    #progress-container:hover #progress-handle { opacity: 1; }

    #progress-tooltip {
      position: absolute;
      top: -28px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-bright);
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      transform: translateX(-50%);
      font-variant-numeric: tabular-nums;
    }

    #progress-container:hover #progress-tooltip { opacity: 1; }

    /* ── Controls row ── */
    #controls-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px 10px;
      font-size: 0.82rem;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      position: relative;
    }

    .ctrl-btn:hover { color: var(--text-bright); background: rgba(255, 255, 255, 0.08); }
    .ctrl-btn.active { color: var(--accent); }
    .ctrl-btn svg { width: 20px; height: 20px; }

    #play-btn { width: 40px; height: 40px; }
    #play-btn svg { width: 24px; height: 24px; }

    #time-display {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      padding: 0 8px;
      white-space: nowrap;
      letter-spacing: 0.02em;
      user-select: none;
    }

    .ctrl-spacer { flex: 1; }

    /* ── Volume ── */
    .ctrl-volume {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .volume-slider-wrap {
      width: 80px;
      display: flex;
      align-items: center;
      margin-left: 4px;
    }

    #volume-slider {
      width: 80px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, var(--accent) var(--vol-pct, 100%), rgba(255, 255, 255, 0.15) var(--vol-pct, 100%));
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 4px rgba(212, 162, 76, 0.4);
    }

    /* ── Control menus ── */
    .ctrl-menu {
      position: relative;
    }

    .ctrl-popup {
      position: absolute;
      bottom: calc(100% + 8px);
      right: -8px;
      background: var(--popup-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }

    .ctrl-popup.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .popup-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 10px 4px;
    }

    .popup-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .popup-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.82rem;
      font-family: var(--font);
      cursor: pointer;
      border-radius: 5px;
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }

    .popup-opt:hover { background: var(--bg-hover); color: var(--text-bright); }

    .popup-opt.active {
      color: var(--accent);
    }

    .popup-opt.active::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .popup-opt:not(.active)::before {
      content: '';
      width: 4px;
      height: 4px;
      flex-shrink: 0;
    }

    /* ── Toggle switches ── */
    .popup-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 5px;
      transition: background 0.1s;
      font-size: 0.82rem;
      color: var(--text);
    }

    .popup-toggle:hover { background: var(--bg-hover); }

    .popup-toggle input { display: none; }

    .toggle-track {
      width: 34px;
      height: 18px;
      background: var(--bg-active);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .popup-toggle input:checked + .toggle-track {
      background: var(--accent-dim);
    }

    .popup-toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
      background: var(--accent);
    }

    /* ── Speed label button ── */
    #speed-btn {
      width: auto;
      padding: 0 8px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: var(--font);
      letter-spacing: 0.02em;
    }

    /* ═══════════════════════ Transcript ═══════════════════════ */
    #transcript-panel {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      transition: width 0.25s ease, opacity 0.25s ease;
      overflow: hidden;
    }

    #transcript-panel.collapsed {
      width: 0;
      border-left-color: transparent;
    }

    .transcript-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .transcript-toggle {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .transcript-toggle:hover { background: var(--bg-hover); color: var(--text-bright); }
    .transcript-toggle svg { width: 14px; height: 14px; }

    .transcript-header-title {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .transcript-list {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0;
    }

    .transcript-list::-webkit-scrollbar { width: 5px; }
    .transcript-list::-webkit-scrollbar-track { background: transparent; }
    .transcript-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .transcript-list::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    .transcript-row {
      display: flex;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }

    .transcript-row:hover { background: var(--bg-hover); }

    .transcript-row.active {
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }

    .transcript-time {
      font-size: 0.72rem;
      color: var(--text-dim);
      flex-shrink: 0;
      width: 3.2rem;
      padding-top: 0.15rem;
      font-variant-numeric: tabular-nums;
    }

    .transcript-text {
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--text);
    }

    .transcript-row.active .transcript-text { color: var(--text-bright); }

    .transcript-word {
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.12s;
      padding: 0 1px;
    }

    .transcript-word:hover {
      background: var(--accent-glow);
      color: var(--text-bright);
    }

    .transcript-pinyin {
      font-size: 0.72rem;
      color: var(--blue);
      font-style: italic;
      display: block;
      line-height: 1.3;
      margin-bottom: 0.1rem;
      font-weight: 300;
    }

    /* ═══════════════════════ Dictionary popup ═══════════════════════ */
    #dict-popup {
      position: fixed;
      z-index: 1000;
      background: var(--popup-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      min-width: 220px;
      max-width: 380px;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
      pointer-events: auto;
    }

    #dict-popup::-webkit-scrollbar { width: 4px; }
    #dict-popup::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

    .dict-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .dict-word {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text-bright);
    }

    .dict-traditional { font-size: 1.1rem; color: var(--text-dim); }
    .dict-traditional::before { content: '('; }
    .dict-traditional::after { content: ')'; }

    .dict-pinyin { font-size: 1rem; color: var(--blue); font-style: italic; }

    .dict-alt-pinyin {
      font-size: 0.9rem;
      color: var(--blue);
      font-style: italic;
      margin-top: 0.5rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
    }

    .dict-speak-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }

    .dict-speak-btn:hover {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .dict-speak-btn svg { width: 16px; height: 16px; }

    .dict-stars {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
    }

    .dict-stars .star { color: var(--text-dim); }
    .dict-stars .star.filled { color: var(--accent); }

    .dict-freq-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-left: 6px;
    }

    .dict-defs { margin: 0.3rem 0 0 1.2rem; padding: 0; list-style: decimal; }

    .dict-defs li {
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.5;
      padding: 0.1rem 0;
    }

    /* ═══════════════════════ Animations ═══════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #drop-zone { animation: fadeIn 0.5s ease; }
  </style>
</head>
<body>

  <div id="landing">
    <div id="drop-zone">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <h1 class="landing-title">Gai<span>shan</span></h1>
      <p class="landing-sub">Drop a video file or click to browse</p>
      <input type="file" id="file-input" accept=".mkv,.mp4,.webm">
      <p class="landing-or">or</p>
      <button class="landing-folder-btn" id="open-folder-btn">Open Folder</button>
      <input type="file" id="folder-input" webkitdirectory>
    </div>
  </div>

  <div id="app" hidden>
    <div id="file-browser" class="collapsed">
      <div class="fb-header">
        <span class="fb-header-title" id="fb-title">Files</span>
        <button class="fb-close" id="fb-close" title="Close">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 3L3 11M3 3l8 8"/></svg>
        </button>
      </div>
      <div class="fb-tree" id="fb-tree"></div>
    </div>
    <div id="player-area" class="controls-visible">
      <video id="video"></video>
      <div id="subtitle-overlay"></div>
      <div id="toast"></div>

      <div id="controls-wrapper">
        <div id="progress-container">
          <div id="progress-track">
            <div id="progress-buffered"></div>
            <div id="progress-fill"></div>
          </div>
          <div id="progress-handle"></div>
          <div id="progress-tooltip">0:00</div>
        </div>

        <div id="controls-bar">
          <button class="ctrl-btn" id="play-btn" title="Play / Pause">
            <svg viewBox="0 0 24 24" fill="currentColor" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
          </button>

          <span id="time-display">0:00 / 0:00</span>

          <!-- Files toggle -->
          <button class="ctrl-btn" id="files-btn" title="File Browser">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            </svg>
          </button>

          <div class="ctrl-spacer"></div>

          <!-- Speed -->
          <div class="ctrl-menu">
            <button class="ctrl-btn" id="speed-btn" title="Playback Speed">1x</button>
            <div class="ctrl-popup" id="speed-popup">
              <div class="popup-title">Speed</div>
              <button class="popup-opt" data-speed="0.5">0.5x</button>
              <button class="popup-opt" data-speed="0.75">0.75x</button>
              <button class="popup-opt active" data-speed="1">1x</button>
              <button class="popup-opt" data-speed="1.25">1.25x</button>
              <button class="popup-opt" data-speed="1.5">1.5x</button>
              <button class="popup-opt" data-speed="1.75">1.75x</button>
              <button class="popup-opt" data-speed="2">2x</button>
              <button class="popup-opt" data-speed="2.5">2.5x</button>
              <button class="popup-opt" data-speed="3">3x</button>
            </div>
          </div>

          <!-- Volume -->
          <div class="ctrl-volume">
            <button class="ctrl-btn" id="volume-btn" title="Volume">
              <svg viewBox="0 0 24 24" fill="currentColor" id="volume-icon">
                <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              </svg>
            </button>
            <div class="volume-slider-wrap">
              <input type="range" id="volume-slider" min="0" max="100" value="100">
            </div>
          </div>

          <!-- Subtitles -->
          <div class="ctrl-menu">
            <button class="ctrl-btn" id="subs-btn" title="Subtitles">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <rect x="2" y="4" width="20" height="16" rx="3"/>
                <line x1="6" y1="12" x2="12" y2="12"/>
                <line x1="6" y1="16" x2="18" y2="16"/>
              </svg>
            </button>
            <div class="ctrl-popup" id="subs-popup">
              <div class="popup-title">Primary</div>
              <div id="primary-sub-options">
                <button class="popup-opt active" data-track="">Off</button>
              </div>
              <div class="popup-divider"></div>
              <div class="popup-title">Secondary</div>
              <div id="secondary-sub-options">
                <button class="popup-opt active" data-track="">Off</button>
              </div>
            </div>
          </div>

          <!-- Audio -->
          <div class="ctrl-menu">
            <button class="ctrl-btn" id="audio-btn" title="Audio Track">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M4 12v-2a6 6 0 0112 0v2"/>
                <rect x="2" y="11" width="4" height="6" rx="1.5" fill="currentColor" stroke="none"/>
                <rect x="14" y="11" width="4" height="6" rx="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </button>
            <div class="ctrl-popup" id="audio-popup">
              <div class="popup-title">Audio</div>
              <div id="audio-options">
                <button class="popup-opt active">None</button>
              </div>
            </div>
          </div>

          <!-- Settings -->
          <div class="ctrl-menu">
            <button class="ctrl-btn" id="settings-btn" title="Settings">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
              </svg>
            </button>
            <div class="ctrl-popup" id="settings-popup">
              <div class="popup-title">Settings</div>
              <label class="popup-toggle">
                <span>Show Readings</span>
                <input type="checkbox" id="setting-pinyin" checked>
                <span class="toggle-track"></span>
              </label>
              <label class="popup-toggle">
                <span>Simplified Characters</span>
                <input type="checkbox" id="setting-simplified">
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>

          <!-- Transcript toggle -->
          <button class="ctrl-btn active" id="transcript-btn" title="Transcript">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <rect x="4" y="3" width="16" height="18" rx="2"/>
              <line x1="8" y1="8" x2="16" y2="8"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
              <line x1="8" y1="16" x2="13" y2="16"/>
            </svg>
          </button>

          <!-- Fullscreen -->
          <button class="ctrl-btn" id="fullscreen-btn" title="Fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8V5a2 2 0 012-2h3M16 3h3a2 2 0 012 2v3M21 16v3a2 2 0 01-2 2h-3M8 21H5a2 2 0 01-2-2v-3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div id="transcript-panel">
      <div class="transcript-header">
        <button class="transcript-toggle" title="Close transcript">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 3L3 11M3 3l8 8"/></svg>
        </button>
        <span class="transcript-header-title">Transcript</span>
      </div>
      <div class="transcript-list"></div>
    </div>
  </div>

  <script type="module" src="/src/player/app.js"></script>
</body>
</html>
