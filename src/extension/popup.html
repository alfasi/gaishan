<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaishan</title>
  <style>
    :root {
      --bg: #0b0c12;
      --bg-surface: #111219;
      --bg-elevated: #1a1b27;
      --bg-hover: #232535;
      --bg-active: #2c2e44;
      --border: #262840;
      --border-light: #34375a;
      --text: #c4c7d8;
      --text-dim: #6a6d84;
      --text-bright: #e8eaf4;
      --accent: #d4a24c;
      --accent-hover: #e2b35e;
      --accent-dim: rgba(212,162,76,0.12);
      --blue: #6ba0d8;
      --green: #52c17a;
      --red: #d85252;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      width: 280px;
      min-height: 100px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ── Sections ── */
    .section {
      padding: 10px 14px;
    }

    .section-title {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    /* ── Status ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-dim);
    }
    .dot-green { background: var(--green); box-shadow: 0 0 6px rgba(82,193,122,0.5); }
    .dot-gray  { background: var(--text-dim); }

    .sub-status {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 6px;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Button ── */
    .btn {
      display: block;
      width: 100%;
      padding: 7px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.82rem;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      text-align: center;
    }
    .btn:hover:not(:disabled) {
      background: var(--bg-hover);
      border-color: var(--border-light);
      color: var(--text-bright);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ── Toggle rows ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text);
      user-select: none;
    }

    .toggle-row:hover { color: var(--text-bright); }

    .toggle {
      width: 34px;
      height: 18px;
      background: var(--bg-active);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle.on { background: var(--accent-dim); }
    .toggle.on::after { transform: translateX(16px); background: var(--accent); }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">Gaishan</span>
    <span class="logo-sub">Language Learning</span>
  </div>

  <div class="section">
    <div class="section-title">Status</div>
    <div class="status-row">
      <span class="dot dot-gray" id="dot"></span>
      <span id="status-text">Scanning for video…</span>
    </div>
    <div class="sub-status" id="subtitle-status"></div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Subtitle</div>
    <button class="btn" id="load-btn" disabled>Load Subtitle File (.srt / .vtt)</button>
    <input type="file" id="file-input" accept=".srt,.vtt" style="display:none">
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Settings</div>
    <label class="toggle-row">
      <span>Show Readings (pinyin / furigana)</span>
      <div class="toggle on" id="readings-toggle"></div>
    </label>
    <label class="toggle-row">
      <span>Simplified Characters</span>
      <div class="toggle" id="simplified-toggle"></div>
    </label>
  </div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
